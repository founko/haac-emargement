<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAAC — Émargement</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      padding: 2rem 1rem;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #1a3c6e;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .subtitle {
      font-size: 1rem;
      color: #555;
      margin-bottom: 2.5rem;
      text-align: center;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      width: 100%;
      max-width: 360px;
      padding: 1.4rem 1rem;
      border-radius: 16px;
      font-size: 1.2rem;
      font-weight: bold;
      text-decoration: none;
      margin-bottom: 1.2rem;
      border: none;
      cursor: pointer;
    }
    .btn-sign {
      background: #1a73e8;
      color: white;
    }
    .btn-docs {
      background: #34a853;
      color: white;
    }
    .icon { font-size: 2rem; }
    .footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo">🏛️ HAAC</div>
  <p class="subtitle">Haute Autorité de l'Audiovisuel et de la Communication</p>

  <a class="btn btn-sign" href="https://ee.kobotoolbox.org/single/q4S5C8Tx">
    <span class="icon">✍️</span>
    <span>Signer ma présence</span>
  </a>

  <a class="btn btn-docs" href="https://drive.google.com/drive/folders/1k79onk9G4X1x6fFv32WEftFG0eYwIIG7" target="_blank">
    <span class="icon">📂</span>
    <span>Accéder aux supports</span>
  </a>

  <div class="footer">© 2026 HAAC — Tous droits réservés</div>
</body>
</html>
