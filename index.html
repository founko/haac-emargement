<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAAC — Émargement</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .card { background: white; border-radius: 12px; padding: 2.5rem; max-width: 420px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .check { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; color: #1a1a1a; margin-bottom: 0.5rem; }
    p { color: #555; line-height: 1.6; margin-bottom: 1.5rem; }
    a.btn { display: inline-block; background: #1a73e8; color: white; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-size: 1rem; }
    a.btn:hover { background: #1558b0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>Merci pour votre participation !</h1>
    <p>Votre émargement a bien été enregistré.<br>Vous pouvez maintenant accéder aux supports de cours mis à disposition par la HAAC.</p>
    <a class="btn" href="https://drive.google.com/drive/folders/1k79onk9G4X1x6fFv32WEftFG0eYwIIG7" target="_blank">
      Accéder aux supports de cours
    </a>
  </div>
</body>
</html>
